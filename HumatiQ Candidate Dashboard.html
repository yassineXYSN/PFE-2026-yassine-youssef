  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

opacity:1; transform:none; } }\n@keyframes slide-down { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:none; } }\n@keyframes fade-in    { from { opacity:0; } to { opacity:1; } }\n@keyframes orb-drift  { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-24px) scale(1.08)} }\n@keyframes bar-grow   { from { width:0 !important; } }\n@keyframes ring-draw  { from { stroke-dashoffset:88; } }\n@keyframes ping       { 0%,100%{box-shadow:0 0 0 0 var(--indigo-glow)} 60%{box-shadow:0 0 0 7px transparent} }\n@keyframes counter-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }\n\n.a1 { animation: slide-up .55s .05s ease both; }\n.a2 { animation: slide-up .55s .10s ease both; }\n.a3 { animation: slide-up .55s .17s ease both; }\n.a4 { animation: slide-up .55s .24s ease both; }\n.a5 { animation: slide-up .55s .31s ease both; }\n.a6 { animation: slide-up .55s .38s ease both; }\n.a7 { animation: slide-up .55s .45s ease both; }\n\n/* ── Navbar ── */\n.navbar {\n  position: sticky; top: 0; z-index: 80;\n  background: rgba(7,9,15,0.78);\n  backdrop-filter: blur(24px) saturate(1.5);\n  border-bottom: 1px solid var(--border);\n  animation: slide-down .4s ease both;\n}\n.navbar-inner {\n  max-width: var(--max-w);\n  margin: 0 auto;\n  padding: 0 32px;\n  height: 60px;\n  display: flex; align-items: center; gap: 0;\n}\n.navbar-logo {\n  font-family: var(--font-display); font-size: 19px; font-weight: 800; letter-spacing: -.5px;\n  background: linear-gradient(130deg, var(--indigo) 30%, oklch(72% 0.18 62));\n  -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n  text-decoration: none; margin-right: 40px;\n}\n.navbar-tabs { display: flex; gap: 2px; flex: 1; }\n.ntab {\n  display: flex; align-items: center; gap: 7px;\n  padding: 7px 14px; border-radius: 8px;\n  font-size: 13px; font-weight: 500; color: var(--text3);\n  cursor: pointer; text-decoration: none;\n  transition: background .15s, color .15s;\n  position: relative;\n}\n.ntab:hover { color: var(--text2); background: var(--surface); }\n.ntab.active { color: var(--text); background: var(--surface2); }\n.ntab.active::after {\n  content: ''; position: absolute; bottom: -1px; left: 14px; right: 14px; height: 2px;\n  background: var(--indigo); border-radius: 2px 2px 0 0;\n  box-shadow: 0 0 8px var(--indigo-glow);\n}\n.ntab svg { width: 14px; height: 14px; flex-shrink: 0; }\n.ntab-badge {\n  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px;\n  background: var(--indigo); color: #fff; letter-spacing: .2px;\n  animation: ping 2.4s ease-in-out infinite;\n}\n\n.navbar-right { display: flex; align-items: center; gap: 10px; }\n.navbar-search {\n  display: flex; align-items: center; gap: 7px;\n  background: var(--surface); border: 1px solid var(--border);\n  border-radius: 8px; padding: 7px 13px;\n  font-size: 13px; color: var(--text3); width: 200px; cursor: text;\n  transition: border-color .2s, background .2s;\n}\n.navbar-search:hover { border-color: var(--border2); background: var(--surface2); }\n.navbar-search svg { width: 13px; height: 13px; flex-shrink: 0; }\n\n.navbar-btn {\n  width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;\n  background: var(--surface); border: 1px solid var(--border);\n  display: flex; align-items: center; justify-content: center;\n  cursor: pointer; color: var(--text2); position: relative;\n  transition: background .15s, color .15s;\n}\n.navbar-btn:hover { background: var(--surface2); color: var(--text); }\n.navbar-btn svg { width: 15px; height: 15px; }\n.notif-dot {\n  position: absolute; top: 7px; right: 7px;\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--indigo);\n  animation: ping 2s ease-in-out infinite;\n}\n.navbar-avatar {\n  width: 34px; height: 34px; border-radius: 50%;\n  background: linear-gradient(135deg, var(--indigo), oklch(72% 0.2 300));\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-display); font-size: 12px; font-weight: 800;\n  cursor: pointer; flex-shrink: 0;\n  box-shadow: 0 0 14px var(--indigo-glow);\n  transition: box-shadow .2s, transform .2s;\n}\n.navbar-avatar:hover { box-shadow: 0 0 24px var(--indigo-glow); transform: scale(1.06); }\n\n/* ── Page ── */\n.page { max-width: var(--max-w); margin: 0 auto; padding: 32px 32px 60px; }\n\n/* ── Hero banner ── */\n.hero {\n  position: relative; overflow: hidden;\n  background: var(--bg2);\n  border: 1px solid var(--border);\n  border-radius: var(--radius);\n  padding: 36px 40px 0;\n  margin-bottom: 24px;\n  display: grid;\n  grid-template-columns: 1fr 360px;\n  gap: 0;\n}\n.hero-orb1 {\n  position: absolute; top: -80px; left: -60px;\n  width: 400px; height: 400px;\n  background: radial-gradient(circle, oklch(55% 0.24 280 / 0.15) 0%, transparent 65%);\n  pointer-events: none;\n  animation: orb-drift 9s ease-in-out infinite;\n}\n.hero-orb2 {\n  position: absolute; bottom: -60px; right: 320px;\n  width: 280px; height: 280px;\n  background: radial-gradient(circle, oklch(62% 0.18 62 / 0.1) 0%, transparent 65%);\n  pointer-events: none;\n  animation: orb-drift 13s ease-in-out infinite reverse;\n}\n.hero-grid-lines {\n  position: absolute; inset: 0; pointer-events: none;\n  background-image:\n    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);\n  background-size: 48px 48px;\n  mask-image: radial-gradient(ellipse 90% 100% at 60% 0%, black 10%, transparent 80%);\n}\n\n.hero-left { position: relative; z-index: 1; padding-bottom: 32px; }\n\n.hero-date {\n  font-size: 12px; color: var(--text3); letter-spacing: .4px; margin-bottom: 10px;\n  display: flex; align-items: center; gap: 8px;\n}\n.hero-date-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }\n\n.hero-title {\n  font-family: var(--font-display);\n  font-size: clamp(28px, 3.2vw, 42px);\n  font-weight: 800; letter-spacing: -1.2px; line-height: 1.1;\n  margin-bottom: 8px;\n}\n.hero-title-name {\n  background: linear-gradient(110deg, var(--indigo), oklch(72% 0.2 305));\n  -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n}\n.hero-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }\n\n/* Profile progress */\n.profile-bar-row {\n  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;\n}\n.pbar-label { font-size: 12px; color: var(--text2); white-space: nowrap; }\n.pbar-label strong { color: var(--green); }\n.pbar-track {\n  flex: 1; max-width: 180px; height: 6px;\n  background: var(--border); border-radius: 3px; overflow: hidden;\n}\n.pbar-fill {\n  height: 100%; width: 72%;\n  background: linear-gradient(90deg, var(--green), oklch(74% 0.18 160));\n  border-radius: 3px;\n  animation: bar-grow .9s .3s ease both;\n}\n.pbar-cta {\n  display: flex; align-items: center; gap: 5px;\n  font-size: 12px; font-weight: 600; color: var(--indigo);\n  background: var(--indigo-bg); border: 1px solid oklch(65% 0.24 280 / 0.2);\n  padding: 5px 12px; border-radius: 6px; cursor: pointer;\n  font-family: var(--font-body); transition: opacity .2s, transform .15s;\n}\n.pbar-cta:hover { opacity: .8; transform: translateY(-1px); }\n\n/* KPI strip */\n.hero-kpi-strip {\n  display: grid; grid-template-columns: repeat(4, 1fr);\n  border-top: 1px solid var(--border);\n  margin: 0 -40px;\n}\n.hkpi {\n  padding: 18px 24px;\n  border-right: 1px solid var(--border);\n  transition: background .15s;\n  cursor: default;\n}\n.hkpi:last-child { border-right: none; }\n.hkpi:hover { background: rgba(255,255,255,0.02); }\n.hkpi-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 6px; }\n.hkpi-value {\n  font-family: var(--font-display); font-size: 28px; font-weight: 800;\n  letter-spacing: -1px; line-height: 1;\n  animation: counter-in .5s ease both;\n}\n.hkpi-sub { font-size: 11px; margin-top: 3px; font-weight: 500; }\n\n/* Hero right — figure */\n.hero-right {\n  position: relative; z-index: 1;\n  display: flex; align-items: flex-end;\n  padding-bottom: 0;\n}\n.hero-figure-svg { display: block; width: 100%; }\n\n/* ── Dashboard grid ── */\n.dash-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr 340px;\n  grid-template-rows: auto auto;\n  gap: 16px;\n}\n\n/* ── Cards base ── */\n.card {\n  background: var(--bg2); border: 1px solid var(--border);\n  border-radius: var(--radius); overflow: hidden;\n  transition: border-color .25s, box-shadow .25s;\n}\n.card:hover { border-color: var(--border2); }\n\n.card-head {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 16px 20px 12px;\n  border-bottom: 1px solid var(--border);\n}\n.card-title {\n  font-family: var(--font-display); font-size: 14px; font-weight: 700;\n  letter-spacing: -.2px; display: flex; align-items: center; gap: 8px;\n}\n.ctitle-icon {\n  width: 26px; height: 26px; border-radius: 6px;\n  display: flex; align-items: center; justify-content: center;\n}\n.card-viewall {\n  font-size: 12px; color: var(--indigo); background: none; border: none;\n  font-family: var(--font-body); font-weight: 500; cursor: pointer;\n  display: flex; align-items: center; gap: 3px;\n  transition: opacity .2s, gap .2s;\n}\n.card-viewall:hover { opacity: .7; gap: 6px; }\n.card-body { padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }\n\n/* ── Action items ── */\n.action-item {\n  display: flex; align-items: center; gap: 11px;\n  padding: 11px 14px; border-radius: var(--radius-sm);\n  background: var(--surface); border: 1px solid var(--border);\n  cursor: pointer;\n  transition: background .15s, border-color .2s, transform .2s;\n}\n.action-item:hover { background: var(--surface2); border-color: var(--border2); transform: translateX(4px); }\n.a-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }\n.a-text { flex: 1; font-size: 13px; line-height: 1.45; }\n.a-text span { color: var(--text2); }\n.a-badge { font-si  {\n    label: 'Tech Test',\n    icon: `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 18 22 12 16 6\"/><polyline points=\"8 6 2 12 8 18\"/><\u002Fsvg>`\n  },\n  {\n    label: 'Interview',\n    icon: `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"/><circle cx=\"12\" cy=\"7\" r=\"4\"/><\u002Fsvg>`\n  },\n  {\n    label: 'Offer',\n    icon: `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>`\n  }\n];\n\nfunction buildTracker(containerId, activeStep, refused) {\n  const container = document.getElementById(containerId);\n  if (!container) return;\n\n  // Lines layer\n  const linesWrap = document.createElement('div');\n  linesWrap.className = 'step-track-line-wrap';\n  for (let i = 0; i < STEPS.length - 1; i++) {\n    const seg = document.createElement('div');\n    seg.className = 'step-seg';\n    const fill = document.createElement('div');\n    fill.className = 'step-seg-fill';\n    if (refused && i >= activeStep) {\n      fill.classList.add('none');\n    } else if (i < activeStep) {\n      fill.classList.add('done');\n      fill.style.background = 'linear-gradient(90deg, var(--indigo), oklch(65% 0.22 300))';\n    } else {\n      fill.classList.add('none');\n    }\n    seg.appendChild(fill);\n    linesWrap.appendChild(seg);\n  }\n  container.appendChild(linesWrap);\n\n  // Nodes\n  STEPS.forEach((step, i) => {\n    const node = document.createElement('div');\n    node.className = 'step-node';\n\n    const circle = document.createElement('div');\n    circle.className = 'step-circle';\n\n    const label = document.createElement('div');\n    label.className = 'step-label';\n    label.textContent = step.label;\n\n    if (refused && i === activeStep) {\n      circle.classList.add('refused');\n      circle.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--red)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/><\u002Fsvg>`;\n      label.classList.add('refused');\n    } else if (i < activeStep) {\n      circle.classList.add('done');\n      circle.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--indigo)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>`;\n      label.classList.add('done');\n    } else if (i === activeStep) {\n      circle.classList.add('active');\n      circle.innerHTML = step.icon.replace('stroke=\"currentColor\"', 'stroke=\"var(--indigo)\"');\n      label.classList.add('active');\n    } else {\n      circle.classList.add('inactive');\n      circle.innerHTML = step.icon.replace('stroke=\"currentColor\"', 'stroke=\"rgba(240,242,248,0.2)\"');\n      label.style.opacity = '0.3';\n    }\n\n    node.appendChild(circle);\n    node.appendChild(label);\n    container.appendChild(node);\n  });\n}\n\nbuildTracker('track-tc', 3, false); // Interview\nbuildTracker('track-vg', 1, false); // In Review\nbuildTracker('track-sf', 2, false); // Tech Test\nbuildTracker('track-bt', 1, true);  // Refused at review stage\n\n// Date\nconst d = new Date();\ndocument.getElementById('hero-date').textContent =\n  d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });\n\n// Animated counters\nfunction animCount(el, target, delay) {\n  setTimeout(() => {\n    let start = null;\n    const dur = 750;\n    const step = ts => {\n      if (!start) start = ts;\n      const p = Math.min((ts - start) / dur, 1);\n      el.textContent = Math.round((1 - Math.pow(1 - p, 3)) * target);\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }, delay);\n}\ndocument.querySelectorAll('[data-count]').forEach((el, i) =>\n  animCount(el, +el.dataset.count, 250 + i * 90)\n);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

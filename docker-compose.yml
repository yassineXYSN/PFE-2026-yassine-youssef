services:

  # ── MariaDB ──────────────────────────────────────────────────────────────────
  pfe-db:
    image: mariadb:11
    container_name: nexthire-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - nexthire-mariadb-data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  pfe-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nexthire-backend
    restart: unless-stopped
    depends_on:
      pfe-db:
        condition: service_healthy
    environment:
      DB_HOST: nexthire-db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://nexthire.itc4d.com}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexthire-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.nexthire-backend.entrypoints=websecure"
      - "traefik.http.routers.nexthire-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexthire-backend.loadbalancer.server.port=8000"

  # ── Frontend (React/Vite → Nginx) ───────────────────────────────────────────
  pfe-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${API_DOMAIN}
    container_name: nexthire-frontend
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexthire-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.nexthire-frontend.entrypoints=websecure"
      - "traefik.http.routers.nexthire-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexthire-frontend.loadbalancer.server.port=80"

volumes:
  nexthire-mariadb-data:

networks:
  traefik:
    external: true

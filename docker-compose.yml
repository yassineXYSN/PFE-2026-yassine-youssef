# Full stack: MariaDB + FastAPI backend + Vite/nginx frontend + Adminer
#
# Start everything:  docker compose up --build -d
# Stop + keep data:  docker compose down
# Stop + wipe data:  docker compose down -v

services:

  # ── Database ────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: nexthire-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: nexthire_auth
      MARIADB_USER: nexthire
      MARIADB_PASSWORD: nexthirepass
    ports:
      - "3306:3306"
    volumes:
      - nexthire_mariadb_data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (Atlas Local — supports $vectorSearch) ───────────────────────────
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: nexthire-mongodb
    hostname: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - nexthire_mongodb_data:/data/db
      - nexthire_mongodb_configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB vector-search index init (runs once, then exits) ────────────────
  mongo-init:
    image: mongodb/mongodb-atlas-local:latest
    container_name: nexthire-mongo-init
    restart: "no"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./docs/mongo-vector-init.js:/mongo-vector-init.js:ro
    entrypoint: ["mongosh", "mongodb://mongodb:27017/HumatiQ", "/mongo-vector-init.js"]

  # ── Adminer (optional DB GUI at http://localhost:8081) ──────────────────────
  adminer:
    image: adminer:latest
    container_name: nexthire-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      mariadb:
        condition: service_healthy

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    image: pfe-backend:latest
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST so the container reaches the mariadb service, not localhost
      DB_HOST: mariadb
      MONGODB_URL: mongodb://mongodb:27017/
      MONGODB_ATLAS_TLS_INSECURE: "1"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/api}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_models:/models/hf
      - backend_static:/app/static
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:8080}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-}
    image: pfe-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nexthire_mariadb_data:
  nexthire_mongodb_data:
  nexthire_mongodb_configdb:
  backend_models:
  backend_static:

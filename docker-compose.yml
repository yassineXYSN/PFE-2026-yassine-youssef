# Full stack: MariaDB + MongoDB + FastAPI backend + Vite/nginx frontend
# Routed via Traefik reverse proxy (TLS via Let's Encrypt)
#
# Start:        docker compose up --build -d
# Stop (keep):  docker compose down
# Stop (wipe):  docker compose down -v

services:

  # ── MariaDB ───────────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: nexthire-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - nexthire_mariadb_data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ───────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: nexthire-mongodb
    restart: unless-stopped
    volumes:
      - nexthire_mongodb_data:/data/db
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────────
  pfe-backend:
    build:
      context: ./backend
    container_name: nexthire-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: nexthire-mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      MONGODB_URL: mongodb://nexthire-mongodb:27017/
      FRONTEND_URL: https://${APP_DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://nexthire.itc4d.com}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/api}
    depends_on:
      mariadb:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_models:/models/hf
      - backend_static:/app/static
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexthire-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.nexthire-backend.entrypoints=websecure"
      - "traefik.http.routers.nexthire-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexthire-backend.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend (React/Vite → Nginx) ────────────────────────────────────────────
  pfe-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${API_DOMAIN}
        VITE_FRONTEND_URL: https://${APP_DOMAIN}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-}
    container_name: nexthire-frontend
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexthire-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.nexthire-frontend.entrypoints=websecure"
      - "traefik.http.routers.nexthire-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexthire-frontend.loadbalancer.server.port=80"

volumes:
  nexthire_mariadb_data:
  nexthire_mongodb_data:
  backend_models:
  backend_static:

networks:
  traefik:
    external: true

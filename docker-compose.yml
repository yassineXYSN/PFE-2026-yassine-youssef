services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  pfe-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pfe-backend
    restart: unless-stopped
    environment:
      MONGODB_URL: ${MONGODB_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://nexthire.itc4d.com}
      # Set to "true" only if Atlas TLS causes issues on this host
      MONGODB_ATLAS_TLS_INSECURE: ${MONGODB_ATLAS_TLS_INSECURE:-false}
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pfe-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.pfe-backend.entrypoints=websecure"
      - "traefik.http.routers.pfe-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.pfe-backend.loadbalancer.server.port=8000"

  # ── Frontend (React/Vite → Nginx) ───────────────────────────────────────────
  pfe-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: https://${API_DOMAIN}
    container_name: pfe-frontend
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pfe-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.pfe-frontend.entrypoints=websecure"
      - "traefik.http.routers.pfe-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.pfe-frontend.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
